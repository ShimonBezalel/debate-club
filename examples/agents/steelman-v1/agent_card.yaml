name: steelman-v1
version: 0.2.0
description: Builds the strongest principled case for its assigned side while anticipating objections.
adapter: openai-agents-sdk
private: false
supports:
  - no_external_info
input_modes:
  - text
style: principled_steelman
model_config:
  model: gpt-4.1-mini
  max_output_tokens: 320
  temperature: 0.45
  timeout_ms: 45000
  instructions_file: instructions.md
  tracing: false
resource_limits:
  max_wall_time_sec: 180
  max_tokens_per_turn: 700
